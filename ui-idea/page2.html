<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>添加服药计划 UI 演示</title>
  <style>
    body { background-color: #e5e7eb; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: system-ui, -apple-system, sans-serif; }
    /* 模拟手机外壳 */
    .mobile-frame { width: 375px; height: 812px; background: #f8fafc; border-radius: 40px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); overflow: hidden; position: relative; border: 8px solid #1e293b; display: flex; flex-direction: column; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>

  <div class="mobile-frame">
    
    <div class="px-5 pt-14 pb-8 bg-gradient-to-br from-teal-500 to-emerald-400 text-white rounded-b-[2.5rem] shadow-lg relative z-10">
      <div class="flex items-center space-x-3">
        <button class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center backdrop-blur-sm active:scale-90 transition">
           <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
        </button>
        <h1 class="text-2xl font-bold tracking-tight">添加服药计划</h1>
      </div>
    </div>

    <div class="flex-1 px-5 py-6 overflow-y-auto no-scrollbar space-y-5 bg-slate-50">
      
      <div class="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 space-y-5">
         
         <div>
            <label class="block text-slate-800 font-bold mb-2 text-lg">药品名称 <span class="text-red-500">*</span></label>
            <input type="text" class="w-full bg-slate-100/70 border border-transparent rounded-2xl px-4 py-4 text-lg text-slate-800 font-medium focus:bg-white focus:border
