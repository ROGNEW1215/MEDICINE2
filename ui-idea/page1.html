<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>智能服药管家 UI 演示</title>
  <style>
    body { background-color: #e5e7eb; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: system-ui, -apple-system, sans-serif; }
    /* 模拟手机外壳 */
    .mobile-frame { width: 375px; height: 812px; background: #f8fafc; border-radius: 40px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); overflow: hidden; position: relative; border: 8px solid #1e293b; display: flex; flex-direction: column; }
    /* 隐藏滚动条但保留滚动功能 */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>

  <div class="mobile-frame">
    
    <div class="px-6 pt-14 pb-6 bg-gradient-to-br from-teal-500 to-emerald-400 text-white rounded-b-[2.5rem] shadow-lg relative z-10">
      <div class="flex justify-between items-center">
        <div>
          <p class="text-sm font-medium opacity-80 mb-1">2026年6月15日 星期一</p>
          <h1 class="text-3xl font-bold tracking-tight">爷爷，早上好！</h1>
        </div>
        <div class="w-12 h-12 bg-white/20 rounded-full border-2 border-white flex items-center justify-center text-xl shadow-inner">
          👴
        </div>
      </div>

      <div class="mt-8 bg-white/20 rounded-2xl p-4 backdrop-blur-sm border border-white/30 flex items-center justify-between shadow-sm">
         <div>
            <p class="text-sm font-medium mb-1">今日服药进度</p>
            <p class="text-2xl font-extrabold">1 <span class="text-lg opacity-70 font-normal">/ 3 次</span></p>
         </div>
         <div class="w-14 h-14 rounded-full border-4 border-white/20 border-t-white border-r-white flex items-center justify-center">
           <span class="text-sm font-bold">33%</span>
         </div>
      </div>
    </div>

    <div class="flex-1 px-5 py-6 overflow-y-auto no-scrollbar space-y-5 bg-slate-50">
      
      <div class="flex justify-between items-end mb-2">
        <h2 class="text-xl font-bold text-slate-800">待办任务</h2>
      </div>

      <div class="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 flex items-center justify-between transform transition hover:-translate-y-1 hover:shadow-md">
        <div class="flex items-center space-x-4">
          <div class="w-14 h-14 bg-orange-50 rounded-2xl flex items-center justify-center text-orange-500 text-2xl shadow-inner">
            💊
          </div>
          <div>
            <div class="flex items-center space-x-2">
              <h3 class="text-lg font-bold text-slate-800">阿莫西林胶囊</h3>
              <span class="px-2 py-0.5 bg-red-100 text-red-600 text-xs font-bold rounded-full">09:00</span>
            </div>
            <p class="text-slate-500 text-sm mt-1 font-medium">每次 2 粒 · 饭后服用</p>
          </div>
        </div>
        <button class="bg-teal-500 text-white w-12 h-12 rounded-full flex items-center justify-center shadow-lg shadow-teal-500/30 active:scale-90 transition">
           <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
        </button>
      </div>

       <div class="bg-slate-100/50 rounded-3xl p-5 border border-slate-100 flex items-center justify-between opacity-70">
        <div class="flex items-center space-x-4">
          <div class="w-14 h-14 bg-slate-200 rounded-2xl flex items-center justify-center text-slate-400 text-2xl">
            💧
          </div>
          <div>
            <h3 class="text-lg font-bold text-slate-500 line-through">降压药</h3>
            <p class="text-slate-400 text-sm mt-1">早上 08:00</p>
          </div>
        </div>
        <div class="text-teal-600 font-bold flex items-center text-sm">
           已打卡
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4 pt-4 mt-4 border-t border-slate-200/60">
        <button class="bg-red-500 text-white rounded-3xl p-4 shadow-lg shadow-red-500/20 flex flex-col items-center justify-center active:scale-95 transition">
          <span class="text-3xl mb-2">🆘</span>
          <span class="font-bold text-sm tracking-wide">紧急呼救</span>
        </button>
        <button class="bg-white text-slate-700 rounded-3xl p-4 shadow-sm border border-slate-100 flex flex-col items-center justify-center active:scale-95 transition">
          <span class="text-3xl mb-2">❤️</span>
          <span class="font-bold text-sm tracking-wide">记录血压</span>
        </button>
      </div>
    </div>

    <div class="h-20 bg-white border-t border-slate-100 flex justify-around items-center px-6 pb-4 pt-2 shadow-[0_-10px_40px_rgba(0,0,0,0.03)] z-20 relative">
       <div class="flex flex-col items-center text-teal-500 cursor-pointer transition transform hover:scale-110">
         <svg class="w-7 h-7 mb-1" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
         <span class="text-[10px] font-bold">首页</span>
       </div>
       <div class="flex flex-col items-center text-slate-400 cursor-pointer transition transform hover:scale-110 hover:text-slate-600">
         <svg class="w-7 h-7 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
         <span class="text-[10px] font-bold">健康记录</span>
       </div>
       <div class="flex flex-col items-center text-slate-400 cursor-pointer transition transform hover:scale-110 hover:text-slate-600">
         <svg class="w-7 h-7 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
         <span class="text-[10px] font-bold">设置</span>
       </div>
    </div>
  </div>

</body>
</html>
