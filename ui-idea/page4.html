<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>健康打卡 UI 演示</title>
  <style>
    body { background-color: #e5e7eb; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: system-ui, -apple-system, sans-serif; }
    /* 模拟手机外壳 */
    .mobile-frame { width: 375px; height: 812px; background: #f8fafc; border-radius: 40px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); overflow: hidden; position: relative; border: 8px solid #1e293b; display: flex; flex-direction: column; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>

  <div class="mobile-frame">
    
    <div class="px-5 pt-14 pb-12 bg-gradient-to-br from-teal-500 to-emerald-400 text-white rounded-b-[2.5rem] shadow-lg relative z-10">
      <div class="flex justify-between items-center">
         <div class="flex items-center space-x-3">
           <button class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center backdrop-blur-sm active:scale-90 transition">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
           </button>
           <h1 class="text-2xl font-bold tracking-tight">健康打卡</h1>
         </div>
      </div>
    </div>

    <div class="flex-1 px-5 -mt-6 overflow-y-auto no-scrollbar relative z-20 pb-8">
      
      <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 space-y-6">
         
         <div class="flex items-center space-x-3 mb-2">
            <div class="w-10 h-10 bg-rose-50 rounded-full flex items-center justify-center text-rose-500 text-xl">❤️</div>
            <h2 class="text-xl font-bold text-slate-800">记录今日血压</h2>
         </div>

         <div>
            <label class="block text-slate-600 font-bold mb-2">收缩压 (高压) <span class="text-xs font-normal text-slate-400 ml-1">mmHg</span></label>
            <input type="number" class="w-full bg-slate-100/70 border border-transparent rounded-2xl px-5 py-4 text-2xl text-slate-800 font-bold focus:bg-white focus:border-teal-400 focus:outline-none focus:ring-2 focus:ring-teal-100 transition placeholder:font-normal placeholder:text-slate-400 placeholder:text-lg" placeholder="例如: 120" />
         </div>

         <div>
            <label class="block text-slate-600 font-bold mb-2">舒张压 (低压) <span class="text-xs font-normal text-slate-400 ml-1">mmHg</span></label>
            <input type="number" class="w-full bg-slate-100/70 border border-transparent rounded-2xl px-5 py-4 text-2xl text-slate-800 font-bold focus:bg-white focus:border-teal-400 focus:outline-none focus:ring-2 focus:ring-teal-100 transition placeholder:font-normal placeholder:text-slate-400 placeholder:text-lg" placeholder="例如: 80" />
         </div>
      </div>

      <div class="mt-5 bg-teal-50/50 rounded-3xl p-5 border border-teal-100/50 flex items-start space-x-3">
         <div class="text-teal-500 mt-0.5">💡</div>
         <div>
            <p class="text-slate-700 font-bold text-sm mb-1">长者血压参考范围</p>
            <p class="text-slate-500 text-xs leading-relaxed">
               高压 (收缩压) 正常值约为 90 - 139 mmHg。<br>
               低压 (舒张压) 正常值约为 60 - 89 mmHg。<br>
               <span class="text-teal-600/80">保持心情平稳时测量更准确哦。</span>
            </p>
         </div>
      </div>

      <div class="mt-8">
         <button class="w-full bg-teal-500 text-white font-bold text-xl py-4 rounded-[2rem] shadow-xl shadow-teal-500/30 active:scale-95 transition transform flex justify-center items-center">
            保存今日记录
         </button>
      </div>

    </div>
  </div>

</body>
</html>
