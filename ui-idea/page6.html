<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>个人设置 UI 演示</title>
  <style>
    body { background-color: #e5e7eb; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: system-ui, -apple-system, sans-serif; }
    .mobile-frame { width: 375px; height: 812px; background: #f8fafc; border-radius: 40px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); overflow: hidden; position: relative; border: 8px solid #1e293b; display: flex; flex-direction: column; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>

  <div class="mobile-frame">
    
    <div class="px-5 pt-14 pb-12 bg-gradient-to-br from-teal-500 to-emerald-400 text-white rounded-b-[2.5rem] shadow-lg relative z-10">
      <div class="flex items-center space-x-3">
        <button class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center backdrop-blur-sm active:scale-90 transition">
           <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
        </button>
        <h1 class="text-2xl font-bold tracking-tight">个人设置</h1>
      </div>
    </div>

    <div class="flex-1 px-5 -mt-6 overflow-y-auto no-scrollbar relative z-20 pb-8">
      
      <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 mb-5 relative overflow-hidden">
         <div class="absolute -top-4 -right-4 text-7xl opacity-5">👴</div>
         
         <div class="flex items-center space-x-3 mb-4">
            <div class="w-10 h-10 bg-teal-50 rounded-full flex items-center justify-center text-teal-500 text-xl">👤</div>
            <h2 class="text-xl font-bold text-slate-800">基本信息</h2>
         </div>

         <div>
            <label class="block text-slate-600 font-bold mb-2">长者的称呼 / 姓名</label>
            <input type="text" class="w-full bg-slate-100/70 border border-transparent rounded-2xl px-5 py-4 text-xl text-slate-800 font-bold focus:bg-white focus:border-teal-400 focus:outline-none focus:ring-2 focus:ring-teal-100 transition placeholder:font-normal placeholder:text-slate-400 placeholder:text-lg" placeholder="例如: 王爷爷" value="爷爷" />
         </div>
      </div>

      <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 mb-5 relative overflow-hidden">
         <div class="absolute -top-4 -right-4 text-7xl opacity-5">🆘</div>

         <div class="flex items-center space-x-3 mb-4">
            <div class="w-10 h-10 bg-rose-50 rounded-full flex items-center justify-center text-rose-500 text-xl">☎️</div>
            <h2 class="text-xl font-bold text-slate-800">紧急联系人</h2>
         </div>

         <div>
            <label class="block text-slate-600 font-bold mb-2">家属电话号码 <span class="text-xs font-normal text-slate-400 ml-1">(用于SOS一键呼叫)</span></label>
            <input type="tel" class="w-full bg-slate-100/70 border border-transparent rounded-2xl px-5 py-4 text-2xl text-slate-800 font-bold focus:bg-white focus:border-rose-400 focus:outline-none focus:ring-2 focus:ring-rose-100 transition tracking-wider placeholder:font-normal placeholder:text-slate-400 placeholder:text-lg placeholder:tracking-normal" placeholder="例如: 13800138000" />
         </div>
      </div>

      <div class="mt-8">
         <button class="w-full bg-teal-500 text-white font-bold text-xl py-4 rounded-[2rem] shadow-xl shadow-teal-500/30 active:scale-95 transition transform flex justify-center items-center">
            保存设置
         </button>
      </div>

    </div>
  </div>

</body>
</html>
